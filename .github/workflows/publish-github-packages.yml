name: Publish GitHub Packages

on:
  workflow_dispatch:
    inputs:
      version-suffix:
        description: Prerelease suffix, no leading dash. Empty uses github-<run>.<attempt>.
        default: ''
        type: string
      platform-windows:
        description: Include Windows packages
        default: false
        type: boolean
      platform-linux:
        description: Include Linux packages
        default: true
        type: boolean
      platform-macos:
        description: Include macOS packages
        default: true
        type: boolean
      platform-android:
        description: Include Android packages
        default: false
        type: boolean
      platform-ios:
        description: Include iOS packages
        default: false
        type: boolean
      upload-artifact:
        description: Upload the produced .nupkg files as a workflow artifact
        default: true
        type: boolean

concurrency:
  group: publish-github-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  Publish:
    runs-on: blacksmith-4vcpu-windows-2025
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version suffix
        id: suffix
        shell: pwsh
        run: |
          $suffix = '${{ inputs.version-suffix }}'.Trim()
          if ([string]::IsNullOrWhiteSpace($suffix)) {
            $suffix = 'github-${{ github.run_number }}.${{ github.run_attempt }}'
          }
          if ($suffix -notmatch '^[0-9A-Za-z][0-9A-Za-z.-]*$') {
            echo "::error::Invalid prerelease suffix '$suffix'. Use letters, digits, dots, and hyphens; do not include the leading dash."
            exit 1
          }
          echo "value=$suffix" >> $env:GITHUB_OUTPUT
          echo "::notice::Publishing Stride packages with prerelease suffix '$suffix'"

      - name: Install Apple Workloads
        if: ${{ inputs.platform-ios || inputs.platform-macos }}
        uses: ./.github/actions/stride-workload
        with:
          workloads: ${{ inputs.platform-ios && inputs.platform-macos && 'ios macos' || inputs.platform-ios && 'ios' || 'macos' }}

      - name: Install Android Workload
        if: ${{ inputs.platform-android }}
        uses: ./.github/actions/stride-workload
        with:
          workloads: android

      - name: Build packages
        shell: pwsh
        run: |
          $platforms = @()
          if ("${{ inputs.platform-windows }}" -eq "true") { $platforms += "Windows" }
          if ("${{ inputs.platform-linux }}" -eq "true") { $platforms += "Linux" }
          if ("${{ inputs.platform-android }}" -eq "true") { $platforms += "Android" }
          if ("${{ inputs.platform-ios }}" -eq "true") { $platforms += "iOS" }
          if ("${{ inputs.platform-macos }}" -eq "true") { $platforms += "macOS" }
          $platforms = $platforms -join ";"
          if ([string]::IsNullOrWhiteSpace($platforms)) {
            echo "::error::At least one platform must be selected."
            exit 1
          }
          $packageTarget = "Package"
          $maxCpuCount = "-m"
          $autoAddHost = "true"
          if ("${{ inputs.platform-windows }}" -ne "true") {
            $packageTarget = "CodeOnlyPackages"
            $maxCpuCount = "-m:1"
            $autoAddHost = "false"
          }
          echo "Building for platforms: $platforms"
          echo "Package target: $packageTarget"
          dotnet build build\Stride.build `
            -t:$packageTarget `
            --no-restore `
            $maxCpuCount -nr:false `
            -p:StridePlatforms=$($platforms.Replace(';','%3B')) `
            -p:StrideGraphicsApiDependentBuildAll=true `
            -p:StridePlatformAutoAddHost=$autoAddHost `
            -p:StrideSign=false `
            -p:StrideVersionSuffix=${{ steps.suffix.outputs.value }} `
            -p:StrideBuildPrerequisitesInstaller=false `
            -p:StrideNativeBuildMode=Clang
        env:
          StrideDisableAssetCompilerExecServerProxy: true

      - name: List packages
        shell: pwsh
        run: |
          $packages = Get-ChildItem -Path bin/packages -Filter "*.nupkg" | Sort-Object Name
          if (-not $packages) {
            echo "::error::No packages were produced."
            exit 1
          }
          echo "## Packages" >> $env:GITHUB_STEP_SUMMARY
          echo '```' >> $env:GITHUB_STEP_SUMMARY
          $packages | ForEach-Object { echo $_.Name >> $env:GITHUB_STEP_SUMMARY }
          echo '```' >> $env:GITHUB_STEP_SUMMARY

      - name: Validate code-only template package
        shell: pwsh
        run: |
          $template = Get-ChildItem -Path bin/packages -Filter "Stride.Templates.CodeOnly.*-${{ steps.suffix.outputs.value }}.nupkg" | Sort-Object Name | Select-Object -Last 1
          if (-not $template) {
            $template = Get-ChildItem -Path bin/packages -Filter "Stride.Templates.CodeOnly.*.nupkg" | Sort-Object LastWriteTimeUtc | Select-Object -Last 1
          }
          if (-not $template) {
            echo "::error::Stride.Templates.CodeOnly package was not produced."
            exit 1
          }

          $work = Join-Path $env:RUNNER_TEMP "stride-codeonly-template-smoke"
          Remove-Item -Recurse -Force $work -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $work | Out-Null

          dotnet new uninstall Stride.Templates.CodeOnly 2>$null
          dotnet new install --force $template.FullName
          if ($LASTEXITCODE -ne 0) {
            echo "::error::Failed to install $($template.Name)."
            exit 1
          }

          $project = Join-Path $work "SmokeGame"
          dotnet new stride-macos-fsharp -n SmokeGame -o $project
          if ($LASTEXITCODE -ne 0) {
            echo "::error::Failed to instantiate stride-macos-fsharp."
            exit 1
          }
          if (-not (Test-Path (Join-Path $project "NuGet.config"))) {
            echo "::error::Generated stride-macos-fsharp project did not include NuGet.config."
            exit 1
          }

          $smokeNuGetConfig = Join-Path $work "NuGet.Smoke.config"
          $producedPackages = (Resolve-Path bin/packages).Path
          @"
          <configuration>
            <packageSources>
              <clear />
              <add key="produced" value="$producedPackages" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          "@ | Set-Content -Path $smokeNuGetConfig -Encoding UTF8

          dotnet restore (Join-Path $project "SmokeGame.fsproj") `
            --configfile $smokeNuGetConfig `
            --no-cache
          if ($LASTEXITCODE -ne 0) {
            echo "::error::Generated stride-macos-fsharp project did not restore against the produced packages."
            exit 1
          }

          dotnet build (Join-Path $project "SmokeGame.fsproj") --no-restore
          if ($LASTEXITCODE -ne 0) {
            echo "::error::Generated stride-macos-fsharp project did not build."
            exit 1
          }

          $resolvedPackages = dotnet list (Join-Path $project "SmokeGame.fsproj") package --include-transitive
          if ($LASTEXITCODE -ne 0) {
            echo "::error::Could not inspect generated stride-macos-fsharp package graph."
            exit 1
          }
          $toolkitPackages = $resolvedPackages | Select-String -Pattern "Stride\.CommunityToolkit"
          if ($toolkitPackages) {
            echo "::error::Generated stride-macos-fsharp project should not depend on Stride.CommunityToolkit packages."
            exit 1
          }

          dotnet publish (Join-Path $project "SmokeGame.fsproj") -c Release --no-restore
          if ($LASTEXITCODE -ne 0) {
            echo "::error::Generated stride-macos-fsharp project did not publish."
            exit 1
          }

      - name: Validate FShade package
        shell: pwsh
        run: |
          $fshadePackage = Get-ChildItem -Path bin/packages -Filter "Stride.FShade.*-${{ steps.suffix.outputs.value }}.nupkg" | Sort-Object Name | Select-Object -Last 1
          if (-not $fshadePackage) {
            $fshadePackage = Get-ChildItem -Path bin/packages -Filter "Stride.FShade.*.nupkg" | Sort-Object LastWriteTimeUtc | Select-Object -Last 1
          }
          if (-not $fshadePackage) {
            echo "::error::Stride.FShade package was not produced."
            exit 1
          }

          $packageVersion = $fshadePackage.Name -replace '^Stride\.FShade\.(.*)\.nupkg$', '$1'
          echo "::notice::Validating Stride.FShade $packageVersion"

          $work = Join-Path $env:RUNNER_TEMP "stride-fshade-package-smoke"
          Remove-Item -Recurse -Force $work -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $work | Out-Null

          $project = Join-Path $work "FShadePackageSmoke"
          dotnet new console -lang F# -n FShadePackageSmoke -o $project
          if ($LASTEXITCODE -ne 0) {
            echo "::error::Failed to create FShade package smoke project."
            exit 1
          }

          dotnet add (Join-Path $project "FShadePackageSmoke.fsproj") package Stride.FShade --version $packageVersion --no-restore
          if ($LASTEXITCODE -ne 0) {
            echo "::error::Failed to add Stride.FShade package reference."
            exit 1
          }

          $smokeNuGetConfig = Join-Path $work "NuGet.FShade.Smoke.config"
          $producedPackages = (Resolve-Path bin/packages).Path
          @"
          <configuration>
            <packageSources>
              <clear />
              <add key="produced" value="$producedPackages" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          "@ | Set-Content -Path $smokeNuGetConfig -Encoding UTF8

          dotnet restore (Join-Path $project "FShadePackageSmoke.fsproj") `
            --configfile $smokeNuGetConfig `
            --no-cache
          if ($LASTEXITCODE -ne 0) {
            echo "::error::FShade package smoke project did not restore against the produced packages."
            exit 1
          }

          @'
          open Aardvark.Base
          open FShade
          open Stride.FShade

          type Vertex =
              {
                  [<StridePosition>]
                  Position : V4f

                  [<StrideColor>]
                  Color : V4f
              }

          [<ReflectedDefinition>]
          let vertexMain (v : Vertex) =
              vertex {
                  let transform : M44f = uniform?PerModel?ModelViewProjTrafo
                  return { v with Position = transform * v.Position }
              }

          [<ReflectedDefinition>]
          let fragmentMain (v : Vertex) =
              fragment {
                  return v.Color
              }

          let bytecode =
              [
                  Effect.ofFunction vertexMain
                  Effect.ofFunction fragmentMain
              ]
              |> Effect.compose
              |> EffectBytecodeCompiler.compileWithOutputs [
                  EffectOutput.color<V4f> 0
              ]

          printfn "stages=%d inputs=%d cbuffers=%d" bytecode.Stages.Length bytecode.Reflection.InputAttributes.Count bytecode.Reflection.ConstantBuffers.Count

          for constantBuffer in bytecode.Reflection.ConstantBuffers do
              printfn "cbuffer %s members=%d" constantBuffer.Name constantBuffer.Members.Length
              for memberInfo in constantBuffer.Members do
                  printfn "member %s key=%s" memberInfo.RawName memberInfo.KeyInfo.KeyName

          let hasWorldViewProjection =
              bytecode.Reflection.ConstantBuffers
              |> Seq.collect (fun constantBuffer -> constantBuffer.Members)
              |> Seq.exists (fun memberInfo -> memberInfo.KeyInfo.KeyName = "Transformation.WorldViewProjection")

          if not hasWorldViewProjection then
              failwith "Expected Transformation.WorldViewProjection reflection binding."
          '@ | Set-Content -Path (Join-Path $project "Program.fs") -Encoding UTF8

          dotnet run --project (Join-Path $project "FShadePackageSmoke.fsproj") --no-restore
          if ($LASTEXITCODE -ne 0) {
            echo "::error::FShade package smoke project failed."
            exit 1
          }

      - name: Publish to GitHub Packages
        shell: pwsh
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
        run: |
          $source = "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget add source $source `
            --username "${{ github.actor }}" `
            --password "$env:GITHUB_PACKAGES_TOKEN" `
            --store-password-in-clear-text `
            --name github

          $failed = $false
          Get-ChildItem -Path bin/packages -Filter "*.nupkg" | Sort-Object Name | ForEach-Object {
            echo "Pushing $($_.Name)..."
            dotnet nuget push $_.FullName `
              --source github `
              --api-key "$env:GITHUB_PACKAGES_TOKEN" `
              --timeout 1800 `
              --skip-duplicate
            if ($LASTEXITCODE -ne 0) {
              echo "::error::Failed to push $($_.Name)"
              $failed = $true
            }
          }
          if ($failed) {
            exit 1
          }

      - name: Upload package artifact
        if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: github-packages-${{ steps.suffix.outputs.value }}
          path: bin/packages/*.nupkg
          if-no-files-found: error
